# Path to X-UIs' database
# If you haven't changed the path in X-UI settings, then don't change this
xui_database: /etc/x-ui/x-ui.db

# API Key. Must be the same as the one set in request headers
# You can generate a new API key using the generateAPIKey.js script
# Example API Key: 030161d643b237cbef1a61a5ec4ee424679f656bb33c6ddedac20d3727411462
API_KEY: "YOUR_API_KEY_HASH"

# Database update delay in seconds
# Enter a number greater thatn 1 to avoid spams on database and crashing
reload_delay: 5

# Servers information for running server
# Username and Password: Enter the username and password that is used for the X-UI panel
# PORT: enter the port that X-UI panel is running on
# IP and Address: Set the value to the servers IP and a domain/subdomain that is pointed to that IP
# If you're using Cloudflare to manage subdomains, please remember to turn of the "Tunnel through cloudflare" option
# If you have SSL certificate, your address must start with https. Otherwise, it must be http
xui:
  username: "YOUR_USERNAME"
  password: "YOUR_PASSWORD"
  port: 2052
  address: http://your-server-address.com
  inbounds:
    - 30 # example inbound id, replace with your own
    - 34 # example inbound id, replace with your own

# Specify the PORT that you want the controller to run, change if it is already used
port: 5594
